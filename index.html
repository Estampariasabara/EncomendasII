<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Sabará - Pedidos v4</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 5px; }
        p.sub { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-add { background-color: #25d366; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-add:hover { background-color: #128c7e; }
        .lista { margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; }
        .item { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-left: 4px solid #25d366; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-left: 10px; width: auto; margin-top: 0; }
        #resumo-box { background: #e7f3ef; padding: 15px; margin-top: 15px; border-radius: 5px; font-size: 14px; color: #333; line-height: 1.6; border: 1px solid #c2e0d6; }
        .total-destaque { font-weight: bold; color: #075e54; font-size: 16px; display: block; margin-top: 8px; border-top: 1px solid #ccc; padding-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Estamparia Sabará</h2>
    <p class="sub">Monte sua lista de pedidos abaixo</p>
    
    <label>Nome na Camisa:</label>
    <input type="text" id="nome" placeholder="Ex: JOÃO">

    <label>Número:</label>
    <input type="number" id="numero" placeholder="Ex: 10">

    <label>Tamanho:</label>
    <select id="tamanho">
        <optgroup label="Infantil">
            <option value="PP INF">PP INF</option>
            <option value="P INF">P INF</option>
            <option value="M INF">M INF</option>
            <option value="GI">GI</option>
        </optgroup>
        <optgroup label="Tradicional Adulto">
            <option value="P">P</option>
            <option value="M">M</option>
            <option value="G">G</option>
            <option value="GG">GG</option>
            <option value="EXG 1">EXG 1</option>
            <option value="EXG 2">EXG 2</option>
        </optgroup>
        <optgroup label="Feminino (Babylook)">
            <option value="PPBL">PPBL</option>
            <option value="PBL">PBL</option>
            <option value="MBL">MBL</option>
            <option value="GBL">GBL</option>
            <option value="GGBL">GGBL</option>
        </optgroup>
    </select>

    <button class="btn-add" onclick="adicionarItem()">+ ADICIONAR À LISTA</button>

    <div class="lista" id="listaConteudo"></div>
    <div id="resumo-box" style="display:none;"></div>

    <button onclick="enviarWhatsApp()" style="background-color: #075e54; margin-top: 25px; color: white; font-weight: bold; border: none; cursor: pointer; padding: 15px; border-radius: 5px; width: 100%;">ENVIAR PEDIDO PARA O WHATSAPP</button>
</div>

<script>
    let itens = [];

    function adicionarItem() {
        const nomeInput = document.getElementById('nome');
        const numeroInput = document.getElementById('numero');
        const tamanhoInput = document.getElementById('tamanho');

        const nome = nomeInput.value.toUpperCase().trim();
        const numero = numeroInput.value.trim() || "S/N";
        const tamanho = tamanhoInput.value;

        if (nome === "") { alert("Por favor, digite o nome!"); return; }

        itens.push({ nome, numero, tamanho });

        atualizarTela();
        
        nomeInput.value = "";
        numeroInput.value = "";
        nomeInput.focus();
    }

    function removerItem(index) {
        itens.splice(index, 1);
        atualizarTela();
    }

    function atualizarTela() {
        const listaDiv = document.getElementById('listaConteudo');
        const resumoDiv = document.getElementById('resumo-box');
        
        listaDiv.innerHTML = "";
        let gradeContagem = {};
        let total = 0;

        itens.forEach((it, index) => {
            listaDiv.innerHTML += `
                <div class="item">
                    <span><b>${it.nome}</b> | ${it.numero} | ${it.tamanho}</span>
                    <button class="btn-del" onclick="removerItem(${index})">X</button>
                </div>`;
            
            // Contagem para o resumo
            gradeContagem[it.tamanho] = (gradeContagem[it.tamanho] || 0) + 1;
            total++;
        });

        if (itens.length > 0) {
            resumoDiv.style.display = "block";
            let resumoTexto = "<b>RESUMO DE COSTURA:</b><br>";
            
            for (let tam in gradeContagem) {
                resumoTexto += `${tam}: ${gradeContagem[tam]} | `;
            }
            resumoTexto += `<span class="total-destaque">TOTAL GERAL: ${total} camisas</span>`;
            resumoDiv.innerHTML = resumoTexto;
        } else {
            resumoDiv.style.display = "none";
        }
    }

    function enviarWhatsApp() {
        if (itens.length === 0) { alert("A lista está vazia!"); return; }

        let mensagem = "*PEDIDO - ESTAMPARIA SABARÁ*\n\n";
        mensagem += "*LISTA DE PRODUÇÃO:*\n";
        mensagem += "_Nome | Nº | Tam_\n";
        
        let gradeContagem = {};
        let total = 0;

        itens.forEach(it => {
            mensagem += `${it.nome} | ${it.numero} | ${it.tamanho}\n`;
            gradeContagem[it.tamanho] = (gradeContagem[it.tamanho] || 0) + 1;
            total++;
        });

        mensagem += "\n*RESUMO PARA COSTURA:*\n";
        for (let tam in gradeContagem) {
            mensagem += `${tam}: ${gradeContagem[tam]}\n`;
        }
        mensagem += `\n*TOTAL GERAL: ${total} camisas*`;

        const fone = "5531984104553"; // <-- COLOQUE SEU NÚMERO AQUI
        window.open(`https://wa.me/${fone}?text=${encodeURIComponent(mensagem)}`);
    }
</script>

</body>
</html>
