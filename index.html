<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estamparia Sabará - Pedidos</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #25d366; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #128c7e; }
        .lista { margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        .item { background: #eee; padding: 5px; margin-bottom: 5px; border-radius: 3px; font-size: 14px; }
        #resumo { font-weight: bold; color: #555; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Estamparia Sabará</h2>
    
    <label>Nome na Camisa:</label>
    <input type="text" id="nome" placeholder="Ex: JOÃO">

    <label>Número:</label>
    <input type="number" id="numero" placeholder="Ex: 10">

    <label>Tamanho:</label>
    <select id="tamanho">
        <option value="PP">PP</option>
        <option value="P">P</option>
        <option value="M">M</option>
        <option value="G">G</option>
        <option value="GG">GG</option>
        <option value="EXG">EXG</option>
    </select>

    <button onclick="adicionarItem()">+ ADICIONAR À LISTA</button>

    <div class="lista" id="listaConteudo"></div>
    <div id="resumo"></div>

    <button onclick="enviarWhatsApp()" style="background-color: #075e54;">ENVIAR PEDIDO COMPLETO</button>
</div>

<script>
    let itens = [];
    let grade = { "PP": 0, "P": 0, "M": 0, "G": 0, "GG": 0, "EXG": 0 };

    function adicionarItem() {
        const nome = document.getElementById('nome').value.toUpperCase();
        const numero = document.getElementById('numero').value;
        const tamanho = document.getElementById('tamanho').value;

        if (nome === "") { alert("Digite o nome!"); return; }

        const item = { nome, numero, tamanho };
        itens.push(item);
        grade[tamanho]++;

        atualizarTela();
        
        document.getElementById('nome').value = "";
        document.getElementById('numero').value = "";
        document.getElementById('nome').focus();
    }

    function atualizarTela() {
        const listaDiv = document.getElementById('listaConteudo');
        const resumoDiv = document.getElementById('resumo');
        
        listaDiv.innerHTML = "";
        itens.forEach((it) => {
            listaDiv.innerHTML += `<div class="item">${it.nome} | ${it.numero} | ${it.tamanho}</div>`;
        });

        let resumoTexto = "RESUMO: ";
        for (let tam in grade) {
            if (grade[tam] > 0) resumoTexto += `${tam}: ${grade[tam]} | `;
        }
        resumoDiv.innerText = resumoTexto;
    }

    function enviarWhatsApp() {
        if (itens.length === 0) { alert("A lista está vazia!"); return; }

        let mensagem = "*NOVO PEDIDO - ESTAMPARIA SABARÁ*\n\n";
        mensagem += "*LISTA DE NOMES:*\n";
        itens.forEach(it => {
            mensagem += `${it.nome} | ${it.numero} | ${it.tamanho}\n`;
        });

        mensagem += "\n*RESUMO PARA COSTURA:*\n";
        let total = 0;
        for (let tam in grade) {
            if (grade[tam] > 0) {
                mensagem += `${tam}: ${grade[tam]}\n`;
                total += grade[tam];
            }
        }
        mensagem += `*TOTAL GERAL: ${total} camisas*`;

        const fone = "5531984104553"; // COLOQUE SEU NÚMERO AQUI
        window.open(`https://wa.me/${fone}?text=${encodeURIComponent(mensagem)}`);
    }
</script>

</body>
</html>
